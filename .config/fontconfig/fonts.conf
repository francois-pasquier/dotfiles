<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias binding="strong">
    <family>emoji</family>
    <default><family>Apple Color Emoji</family></default>
  </alias>
  <alias binding="strong">
    <family>Noto Color Emoji</family>
    <default><family>Apple Color Emoji</family></default>
  </alias>
  <alias binding="strong">
    <family>Segoe UI Emoji</family>
    <default><family>Apple Color Emoji</family></default>
  </alias>
  <alias binding="strong">
    <family>Emoji One</family>
    <default><family>Apple Color Emoji</family></default>
  </alias>
</fontconfig>
